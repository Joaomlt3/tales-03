<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Média Final</title>
</head>
<body>
    <script>
        var p1 = parseFloat(prompt("Digite a nota da prova 1:"));
        var p2 = parseFloat(prompt("Digite a nota da prova 2:"));
        var p3 = parseFloat(prompt("Digite a nota da prova 3:"));

        var media = (p1 * 2 + p2 * 3 + p3 * 5) / 10;

        document.write("A média final é: " + media);
    </script>
</body>
</html>
