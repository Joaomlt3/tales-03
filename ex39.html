<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Troco</title>
</head>
<body>
    <script>

        var compra = parseFloat(prompt("Digite o valor da compra:"))
        var pago = parseFloat(prompt("Digite o valor pago:"))

        var troco = pago - compra

        document.write("Valor da compra: R$ " + compra + "<br>")
        document.write("Valor pago: R$ " + pago + "<br>")
        document.write("Troco: R$ " + troco + "<br><br>")

        var notas100 = parseInt(troco / 100)
        troco = troco % 100

        var notas10 = parseInt(troco / 10)
        troco = troco % 10

        var notas1 = parseInt(troco)

        document.write("Notas de 100: " + notas100 + "<br>")
        document.write("Notas de 10: " + notas10 + "<br>")
        document.write("Notas de 1: " + notas1)

    </script>
</body>
</html>
