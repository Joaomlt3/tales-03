<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Troco</title>
</head>
<body>
    <script>
     var valor = parseInt(prompt("digite o valor da compra"))
     var valorpago= parseInt(prompt("digite o valor pago"))
     var troco = valorpago - valor
     document.write("valor de compra:"+valor + "<br>")
     document.write("valor de troco" + troco + "<br>")
     if (troco > 99){
        document.write("o troco sera com a nota de 100")
     }
     if (troco >= 10 , troco < 100) {
        document.write("o troco sera com a nota de 10" + "<br>")
     }
     if (troco < 10){
        document.write ("o troco sera com a nota de 1 " + "<br>")
     }
     </script>
</body>
</html>
