<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dias</title>
</head>
<body>
    <script>

        var anos = parseInt(prompt("Digite sua idade em anos:"))
        var meses = parseInt(prompt("Digite os meses adicionais:"))
        var dias = parseInt(prompt("Digite os dias adicionais:"))

        var totalDias = (anos * 365) + (meses * 30) + dias

        document.write("Você já viveu aproximadamente " + totalDias + " dias")

    </script>
</body>
</html>
