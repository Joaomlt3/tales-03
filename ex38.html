<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comparação</title>
</head>
<body>
    <script>

        var a = parseFloat(prompt("Digite o valor de A:"))
        var b = parseFloat(prompt("Digite o valor de B:"))
        var c = parseFloat(prompt("Digite o valor de C:"))

        var soma = a + b

        document.write("Soma de A + B: " + soma + "<br>")
        document.write("Valor de C: " + c + "<br><br>")

        if (soma > c) {
            document.write("A soma de A + B é MAIOR que C")
        } else if (soma < c) {
            document.write("A soma de A + B é MENOR que C")
        } else {
            document.write("A soma de A + B é IGUAL a C")
        }

    </script>
</body>
</html>
