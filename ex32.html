<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Classificação</title>
</head>
<body>
    <script>
        var N = parseFloat(prompt("Digite um número:"));

        if (N <= 10){
            document.write("F1");
        } 
        else if (N <= 100){
            document.write("F2");
        } 
        else {
            document.write("F3");
        }
    </script>
</body>
</html>
