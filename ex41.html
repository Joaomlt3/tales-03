<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salário vendedor</title>
</head>
<body>
    <script>

        var salarioMinimo = parseFloat(prompt("Digite o valor do salário mínimo:"))
        var carrosVendidos = parseInt(prompt("Digite a quantidade de carros vendidos:"))
        var valorVendas = parseFloat(prompt("Digite o valor total das vendas:"))

        var salarioFixo = salarioMinimo * 2
        var comissaoCarros = carrosVendidos * 50
        var comissaoVendas = valorVendas * 0.05

        var salarioTotal = salarioFixo + comissaoCarros + comissaoVendas

        document.write("Salário fixo: R$ " + salarioFixo + "<br>")
        document.write("Comissão por carros: R$ " + comissaoCarros + "<br>")
        document.write("Comissão sobre vendas: R$ " + comissaoVendas + "<br><br>")

        document.write("Salário total: R$ " + salarioTotal)

    </script>
</body>
</html>
